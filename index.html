<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Birthday Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Poppins,sans-serif;

.container{
width:420px;
background:white;
padding:45px;
border-radius:25px;

h1{
font-family:'Playfair Display',serif;
color:#d86c92;
font-size:42px;

}

input{
width:100%;
padding:15px;
margin:12px 0;
border:none;
border-radius:12px;
background:#f7f7f7;
font-size:16px;

button{
margin-top:20px;
width:100%;
padding:15px;
border:none;
border-radius:30px;
background:#d86c92;
color:white;
font-size:18px;

button:hover{
background:#c55783;
}

#msg{
margin-top:20px;
color:red;
font-size:15px;

</style>

</head>

</body>
</html>
